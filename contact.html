<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Contact Us - BantulKopi Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdfaf7; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background-color: rgba(43, 30, 22, 0.95) !important; }
        .hero-mini {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center; color: white; padding: 100px 0 60px 0;
        }
        .text-coffee { color: #6f4e37; }
        .contact-box {
            transition: all 0.3s ease;
            background: #fff;
            border-radius: 12px;
        }
        .contact-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(111, 78, 55, 0.1);
        }
        footer { background-color: #2b1e16 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">Bantul<span class="text-warning">Kopi</span></a>

            <div class="collapse navbar-collapse" id="navbarNav">

    </section>

    <section class="container my-5 py-5">
        <div class="row g-4 text-center justify-content-center">
            <div class="col-md-3 col-sm-6">
                <a href="https://instagram.com" target="_blank" class="text-decoration-none text-dark">
                    <div class="p-4 contact-box border">
                        <div class="fs-1 text-danger mb-2"><i class="bi bi-instagram"></i></div>
                        <h5 class="fw-bold">Instagram</h5>
                        <p class="small text-muted">@BantulKopi.Acad</p>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-sm-6">
                <a href="mailto:info@bantulkopi.com" class="text-decoration-none text-dark">

                        <h5 class="fw-bold">Email</h5>
                        <p class="small text-muted">academy@bk.com</p>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-sm-6">
                <a href="https://wa.me/628123456789" target="_blank" class="text-decoration-none text-dark">
                    <div class="p-4 contact-box border">
                        <div class="fs-1 text-success mb-2"><i class="bi bi-whatsapp"></i></div>
                        <h5 class="fw-bold">Whatsapp</h5>
                        <p class="small text-muted">0812-3456-789</p>
                    </div>
                </a>
            </div>
        </div>

        <div class="container">
