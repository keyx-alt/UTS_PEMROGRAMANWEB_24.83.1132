<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BantulKopi Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-card {
            background-color: #ffffff;
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .btn-warning {
            background-color: #ffc107;
            border: none;
            font-weight: bold;
        }
        .btn-warning:hover { background-color: #e0a800; }
        .input-custom {
            background-color: #fff8f2;
            border: 1px solid #ebd9cc;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center px-3">
        <div class="form-card text-center">
            <a href="index.html" class="text-decoration-none"><h3 class="fw-bold mb-4 text-dark">Sign Up</h3></a>
            <form>
                <div class="mb-3 text-start">
                    <label class="form-label fw-semibold text-secondary">Nama</label>
                    <input type="text" class="form-control form-control-lg input-custom" placeholder="Nama Lengkap" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label fw-semibold text-secondary">Password</label>
                    <input type="password" class="form-control form-control-lg input-custom" placeholder="Buat password baru" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-semibold text-secondary">Email</label>
                    <input type="email" class="form-control form-control-lg input-custom" placeholder="contoh@email.com" required>
                </div>
                <button type="submit" class="btn btn-warning btn-lg w-100 rounded-pill py-2 shadow-sm mb-3">Daftar</button>
                <p class="small text-muted mb-0">Sudah punya akun? <a href="signin.html" class="text-warning text-decoration-none fw-bold">Sign In</a></p>
                <a href="index.html" class="d-block small text-secondary mt-3 text-decoration-none">Kembali ke Beranda</a>
            </form>
        </div>
    </div>

</body>
</html>
